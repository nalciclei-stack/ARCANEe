<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Noxus Nutri</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body style="background: #f0fdf4; height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; margin:0;">

<div class="card-biblioteca-lol" style="max-width: 400px; width: 90%; text-align: center; background: white; padding: 40px; border-radius: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05);">
    
    <h2 style="font-weight: 800; color: #1f2937; margin-bottom: 5px;">Bem-vindo</h2>
    <p style="color: #64748b; font-size: 0.9rem; margin-bottom: 30px;">Acesse sua conta no NOXUs Nutri</p>
    
    {% if erro %}
        <p style="color: #ef4444; font-size: 0.85rem; font-weight: 700; margin-bottom: 15px;">{{ erro }}</p>
    {% endif %}

    <form method="POST">
        <input type="text" name="username" placeholder="Usuário" 
               style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 12px; box-sizing: border-box;" required>
        
        <input type="password" name="password" placeholder="Senha" 
               style="width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; box-sizing: border-box;" required>
        
        <button type="submit" class="btn-search-nutri" style="width: 100%; padding: 14px; font-weight: 800; cursor: pointer;">ENTRAR</button>
    </form>

    <div style="margin: 25px 0; display: flex; align-items: center; gap: 10px;">
        <div style="flex:1; height: 1px; background: #e2e8f0;"></div>
        <span style="color: #94a3b8; font-size: 0.8rem; font-weight: 600;">OU</span>
        <div style="flex:1; height: 1px; background: #e2e8f0;"></div>
    </div>

    <a href="{{ url_for('login_google') }}" style="text-decoration: none;">
        <div style="display: flex; align-items: center; justify-content: center; gap: 10px; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; color: #475569; font-weight: 600; font-size: 0.9rem; transition: 0.3s; background: white;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='white'">
            <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81.63z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Entrar com Google
        </div>
    </a>

    <div style="margin-top: 30px;">
        <a href="{{ url_for('home') }}" style="color: #94a3b8; text-decoration: none; font-size: 0.85rem; font-weight: 600;">
            <i class="bi bi-house"></i> Voltar ao site
        </a>
    </div>
</div>

</body>
</html>

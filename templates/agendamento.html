<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Agendar Consulta - Noxus Nutri</title>
</head>
<body>
    <div style="max-width: 800px; margin: 40px auto; padding: 20px;">

        <div class="vital-container" style="text-align: left; margin-top: 30px;">
            <label>Selecione o Profissional</label>
            <select style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px;">

            <label>Data Desejada</label>
            <input type="date" style="width: 100%; padding: 12px; margin-bottom: 20px; border-radius: 8px; border: 1px solid #ddd;">
            
            <button class="btn-noxus-entry" style="width: 100%; background: #1e293b;">Solicitar Disponibilidade via WhatsApp</button>
        </div>
        <button class="btn-noxus-entry" onclick="window.location.href='/home'" style="margin-top: 20px; background: #64748b;">Voltar</button>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noxus Nutri - Beta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar-wrapper">
        <div class="navbar">
            <div class="nav-logo">
                <a href="/home" style="text-decoration: none;">
                    <h2 style="margin:0; color:#10b981; font-weight:800;">NOXUS NUTRI <span class="badge-nav">BETA</span></h2>
                </a>
            </div>
            
            <div class="nav-links">
                <a href="/home">Home</a>
                <a href="/biblioteca">Biblioteca</a>
                <a href="/anamnese">Anamnese</a>
                <a href="/consulta">Consulta</a>
                <a href="/kindred">IA</a>
                <a href="/premium" class="btn-nav-premium">Premium</a>
                
                {% if session.get('user') %}
                    <span class="nav-user-active"><i class="bi bi-person-circle"></i> {{ session['user'] }}</span>
                    <a href="{{ url_for('logout') }}" style="color: #ff4d4d; font-size: 0.8rem;">Sair</a>
                {% else %}
                    <a href="{{ url_for('login') }}" class="btn-login-small">Entrar</a>
                {% endif %}
            </div>
        </div>
    </div>

    <main class="main-wrapper">
        {% block content %}{% endblock %}
    </main>

</body>
</html>

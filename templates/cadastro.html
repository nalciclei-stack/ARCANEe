{% extends "base.html" %}
{% block content %}
<div class="card" style="width: 500px;">
    <h2 style="color: var(--primary);">NOVO RECRUTA</h2>
    <p>Preencha os dados para iniciar a jornada nutricional.</p>
    <form style="text-align: left; padding: 20px;">
        <label>NOME COMPLETO:</label><br>
        <input type="text" style="width: 100%; margin-bottom: 15px; background: #0a1428; border: 1px solid var(--secondary); color: white;"><br>
        <label>OBJETIVO (GANHO/PERDA):</label><br>
        <input type="text" style="width: 100%; margin-bottom: 15px; background: #0a1428; border: 1px solid var(--secondary); color: white;">
        <button type="button" class="btn-riot" style="width: 100%;">CADASTRAR</button>
    </form>
</div>
{% endblock %}
